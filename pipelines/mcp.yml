stages:
  - stage: FovuxMCP_Lint
    displayName: "fovux-mcp — Lint"
    jobs:
      - job: Lint
        displayName: "ruff + mypy"
        pool:
          vmImage: ubuntu-24.04
        steps:
          - task: UsePythonVersion@0
            inputs:
              versionSpec: "3.13"
          - task: Cache@2
            inputs:
              key: 'uv | "$(Agent.OS)" | fovux-mcp/uv.lock'
              restoreKeys: |
                uv | "$(Agent.OS)"
              path: $(UV_CACHE_DIR)
          - pwsh: |
              Invoke-RestMethod https://astral.sh/uv/install.ps1 | Invoke-Expression
              if ($IsWindows) {
                Write-Host "##vso[task.prependpath]$env:USERPROFILE\.local\bin"
              } else {
                Write-Host "##vso[task.prependpath]$env:HOME/.local/bin"
              }
            displayName: Install uv
          - pwsh: |
              $env:UV_CACHE_DIR = "$(UV_CACHE_DIR)"
              Set-Location fovux-mcp
              uv sync --frozen --extra dev
            displayName: Install deps
          - pwsh: |
              python scripts/quality_gate.py mcp-lint
            displayName: Backend quality gate

  - stage: FovuxMCP_Test
    displayName: "fovux-mcp — Test"
    dependsOn: FovuxMCP_Lint
    jobs:
      - job: TestPrimary
        displayName: "Primary matrix"
        strategy:
          matrix:
            Linux_311:
              vmImage: ubuntu-24.04
              pythonVersion: "3.11"
            Linux_312:
              vmImage: ubuntu-24.04
              pythonVersion: "3.12"
            Linux_313:
              vmImage: ubuntu-24.04
              pythonVersion: "3.13"
        pool:
          vmImage: $(vmImage)
        steps:
          - task: UsePythonVersion@0
            inputs:
              versionSpec: $(pythonVersion)
          - task: Cache@2
            inputs:
              key: 'uv | "$(Agent.OS)" | fovux-mcp/uv.lock'
              restoreKeys: |
                uv | "$(Agent.OS)"
              path: $(UV_CACHE_DIR)
          - pwsh: |
              Invoke-RestMethod https://astral.sh/uv/install.ps1 | Invoke-Expression
              if ($IsWindows) {
                Write-Host "##vso[task.prependpath]$env:USERPROFILE\.local\bin"
              } else {
                Write-Host "##vso[task.prependpath]$env:HOME/.local/bin"
              }
            displayName: Install uv
          - pwsh: |
              $env:UV_CACHE_DIR = "$(UV_CACHE_DIR)"
              Set-Location fovux-mcp
              uv sync --frozen --extra dev
            displayName: Install deps
          - pwsh: |
              Set-Location fovux-mcp
              uv run pytest tests --no-header -q
            displayName: Pytest
          - task: PublishTestResults@2
            condition: always()
            inputs:
              testResultsFormat: JUnit
              testResultsFiles: "fovux-mcp/junit.xml"
              testRunTitle: "fovux-mcp Python $(pythonVersion) $(vmImage)"
          - publish: fovux-mcp/coverage.xml
            condition: and(succeeded(), eq(variables['pythonVersion'], '3.13'))
            artifact: fovux-mcp-coverage
            displayName: Publish coverage

      - job: TestSecondary
        displayName: "Secondary OS smoke"
        condition: or(eq(variables['RUN_SECONDARY_OS'], 'true'), eq(variables['Build.CronSchedule.DisplayName'], 'Weekly Slow'))
        continueOnError: true
        strategy:
          matrix:
            MacOS_312:
              vmImage: macos-14
              pythonVersion: "3.12"
            Windows_312:
              vmImage: windows-2022
              pythonVersion: "3.12"
        pool:
          vmImage: $(vmImage)
        steps:
          - task: UsePythonVersion@0
            inputs:
              versionSpec: $(pythonVersion)
          - task: Cache@2
            inputs:
              key: 'uv | "$(Agent.OS)" | fovux-mcp/uv.lock'
              restoreKeys: |
                uv | "$(Agent.OS)"
              path: $(UV_CACHE_DIR)
          - pwsh: |
              Invoke-RestMethod https://astral.sh/uv/install.ps1 | Invoke-Expression
              if ($IsWindows) {
                Write-Host "##vso[task.prependpath]$env:USERPROFILE\.local\bin"
              } else {
                Write-Host "##vso[task.prependpath]$env:HOME/.local/bin"
              }
            displayName: Install uv
          - pwsh: |
              $env:UV_CACHE_DIR = "$(UV_CACHE_DIR)"
              Set-Location fovux-mcp
              uv sync --frozen --extra dev
            displayName: Install deps
          - pwsh: |
              Set-Location fovux-mcp
              uv run pytest tests/unit --no-header -q
            displayName: Pytest smoke
          - task: PublishTestResults@2
            condition: always()
            inputs:
              testResultsFormat: JUnit
              testResultsFiles: "fovux-mcp/junit.xml"
              testRunTitle: "fovux-mcp secondary smoke $(pythonVersion) $(vmImage)"

  - stage: FovuxMCP_Audit
    displayName: "fovux-mcp — Security Audit"
    dependsOn: FovuxMCP_Lint
    jobs:
      - job: Audit
        pool:
          vmImage: ubuntu-24.04
        steps:
          - task: UsePythonVersion@0
            inputs:
              versionSpec: "3.13"
          - task: Cache@2
            inputs:
              key: 'uv | "$(Agent.OS)" | fovux-mcp/uv.lock'
              restoreKeys: |
                uv | "$(Agent.OS)"
              path: $(UV_CACHE_DIR)
          - pwsh: |
              Invoke-RestMethod https://astral.sh/uv/install.ps1 | Invoke-Expression
              if ($IsWindows) {
                Write-Host "##vso[task.prependpath]$env:USERPROFILE\.local\bin"
              } else {
                Write-Host "##vso[task.prependpath]$env:HOME/.local/bin"
              }
            displayName: Install audit tooling
          - pwsh: |
              $env:UV_CACHE_DIR = "$(UV_CACHE_DIR)"
              Set-Location fovux-mcp
              uv sync --frozen --extra dev
            displayName: Install audit deps
          - pwsh: |
              python scripts/quality_gate.py mcp-audit
            displayName: Pip audit

  - stage: FovuxMCP_Docs
    displayName: "fovux-mcp — Docs"
    dependsOn: FovuxMCP_Lint
    jobs:
      - job: Docs
        pool:
          vmImage: ubuntu-24.04
        steps:
          - task: UsePythonVersion@0
            inputs:
              versionSpec: "3.13"
          - task: Cache@2
            inputs:
              key: 'uv | "$(Agent.OS)" | fovux-mcp/uv.lock'
              restoreKeys: |
                uv | "$(Agent.OS)"
              path: $(UV_CACHE_DIR)
          - pwsh: |
              Invoke-RestMethod https://astral.sh/uv/install.ps1 | Invoke-Expression
              if ($IsWindows) {
                Write-Host "##vso[task.prependpath]$env:USERPROFILE\.local\bin"
              } else {
                Write-Host "##vso[task.prependpath]$env:HOME/.local/bin"
              }
            displayName: Install uv
          - pwsh: |
              $env:UV_CACHE_DIR = "$(UV_CACHE_DIR)"
              Set-Location fovux-mcp
              uv sync --frozen --extra dev
            displayName: Install docs deps
          - pwsh: |
              python scripts/quality_gate.py mcp-docs
            displayName: Build docs

  - stage: FovuxMCP_Build
    displayName: "fovux-mcp — Build"
    dependsOn:
      - FovuxMCP_Test
      - FovuxMCP_Docs
      - FovuxMCP_Audit
    jobs:
      - job: Build
        pool:
          vmImage: ubuntu-24.04
        steps:
          - task: UsePythonVersion@0
            inputs:
              versionSpec: "3.13"
          - task: Cache@2
            inputs:
              key: 'uv | "$(Agent.OS)" | fovux-mcp/uv.lock'
              restoreKeys: |
                uv | "$(Agent.OS)"
              path: $(UV_CACHE_DIR)
          - pwsh: |
              Invoke-RestMethod https://astral.sh/uv/install.ps1 | Invoke-Expression
              if ($IsWindows) {
                Write-Host "##vso[task.prependpath]$env:USERPROFILE\.local\bin"
              } else {
                Write-Host "##vso[task.prependpath]$env:HOME/.local/bin"
              }
            displayName: Install build tooling
          - pwsh: |
              $env:UV_CACHE_DIR = "$(UV_CACHE_DIR)"
              Set-Location fovux-mcp
              uv sync --frozen --extra dev
              uv export --no-dev --no-editable --no-hashes --output-file requirements-build.txt
              uv run python -m cyclonedx_py requirements requirements-build.txt -o sbom.cdx.json
              uv run python ../scripts/build_spdx_sbom.py --output sbom.spdx
              uv build
            displayName: Build wheel + sdist + SBOM
          - publish: fovux-mcp/dist
            artifact: fovux-mcp-dist
            displayName: Publish artifacts
          - publish: fovux-mcp/sbom.cdx.json
            artifact: fovux-mcp-sbom
            displayName: Publish CycloneDX SBOM
          - publish: fovux-mcp/sbom.spdx
            artifact: fovux-mcp-spdx
            displayName: Publish SPDX SBOM
