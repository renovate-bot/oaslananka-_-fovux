stages:
  - stage: FovuxNightly
    displayName: "Nightly Dependency and CVE Checks"
    dependsOn: []
    condition: or(eq(variables['RUN_NIGHTLY'], 'true'), eq(variables['Build.CronSchedule.DisplayName'], 'Nightly'))
    jobs:
      - job: Nightly
        pool:
          vmImage: ubuntu-24.04
        steps:
          - task: UsePythonVersion@0
            inputs:
              versionSpec: "3.13"
          - task: UseNode@1
            inputs:
              version: "24.14.1"
          - pwsh: |
              Invoke-RestMethod https://astral.sh/uv/install.ps1 | Invoke-Expression
              if ($IsWindows) {
                Write-Host "##vso[task.prependpath]$env:USERPROFILE\.local\bin"
              } else {
                Write-Host "##vso[task.prependpath]$env:HOME/.local/bin"
              }
            displayName: Install Python tooling
          - pwsh: |
              corepack enable
              corepack prepare pnpm@10.33.0 --activate
            displayName: Install pnpm
          - pwsh: |
              Set-Location fovux-mcp
              uv lock --upgrade --dry-run
            displayName: uv upgrade dry run
          - pwsh: |
              Set-Location fovux-mcp
              uv export --no-dev --no-editable --no-hashes --output-file requirements-audit.txt
              uvx pip-audit -r requirements-audit.txt
            displayName: Nightly pip audit
          - pwsh: |
              Set-Location fovux-studio
              pnpm install --frozen-lockfile
              pnpm outdated
              pnpm audit --prod
            displayName: Nightly pnpm checks
