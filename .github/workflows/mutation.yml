name: Mutation Testing (fovux-mcp)

on:
  schedule:
    - cron: "0 4 * * 0"
  workflow_dispatch:
    inputs:
      module:
        description: "Module to mutate, for example fovux.tools"
        required: false
        default: "fovux"

concurrency:
  group: mutation-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

defaults:
  run:
    shell: bash

jobs:
  mutate:
    if: github.repository == 'oaslananka-lab/fovux'
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78
        with:
          enable-cache: true
      - name: Install project
        working-directory: fovux-mcp
        run: uv sync --frozen --extra dev

      - name: Run mutation tests
        working-directory: fovux-mcp
        run: |
          set -euo pipefail
          uv run --with mutmut mutmut run \
            --paths-to-mutate src/fovux \
            --runner "uv run pytest -x --no-header -q -m 'not slow and not integration and not gpu'"

      - name: Report
        working-directory: fovux-mcp
        run: |
          set -euo pipefail
          uv run --with mutmut mutmut results
          uv run --with mutmut mutmut html

      - name: Upload mutation report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: mutation-report
          path: fovux-mcp/html/
          retention-days: 14
