name: Commitlint

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

defaults:
  run:
    shell: bash

jobs:
  lint:
    if: >
      github.repository == 'oaslananka-lab/fovux' &&
      github.event.pull_request.draft == false
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with: { fetch-depth: 0 }
      - name: Validate conventional commit subjects
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          pattern='^(feat|fix|docs|style|refactor|perf|test|chore|build|ci|revert|security)(\(.+\))?!?: .{1,72}$'
          failures=0
          while IFS= read -r subject; do
            if [[ ! "$subject" =~ $pattern ]]; then
              echo "::error::Invalid commit subject: ${subject}"
              failures=$((failures + 1))
            fi
          done < <(git log --format=%s "${BASE_SHA}..${HEAD_SHA}")

          if (( failures > 0 )); then
            exit 1
          fi
