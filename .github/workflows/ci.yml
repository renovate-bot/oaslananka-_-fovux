name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]
  merge_group:
  workflow_dispatch:
    inputs:
      run_slow:
        description: "Run slow backend validation"
        required: false
        default: "false"
        type: choice
        options: ["false", "true"]
  schedule:
    - cron: "17 2 * * *"

permissions:
  contents: read
  checks: write
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  ci:
    if: >
      github.repository == 'oaslananka-lab/fovux' &&
      (
        github.event_name != 'pull_request' ||
        github.event.pull_request.draft == false
      )
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-2022]
        python-version: ["3.11", "3.12", "3.13"]
        node-version: ["22", "24.14.1"]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Check action SHA pinning
        shell: bash
        run: |
          if grep -R "^[[:space:]]*uses:" .github/workflows/ | grep -v "@[0-9a-f]\{40\}"; then
            echo "ERROR: Unpinned actions found. Use SHA-pinned refs."
            exit 1
          fi

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        if: hashFiles('fovux-mcp/pyproject.toml') != ''
        with:
          python-version: ${{ matrix.python-version }}

      - uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78
        if: hashFiles('fovux-mcp/pyproject.toml') != ''
        with:
          enable-cache: true

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        if: hashFiles('fovux-studio/package.json') != ''
        with:
          node-version: ${{ matrix.node-version }}

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c
        with:
          go-version: "1.25.x"
          cache: false

      - name: Install Task
        shell: bash
        run: |
          go install github.com/go-task/task/v3/cmd/task@v3.50.0
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Install actionlint
        shell: bash
        run: |
          go install github.com/rhysd/actionlint/cmd/actionlint@v1.7.7
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Install pnpm
        if: hashFiles('fovux-studio/package.json') != ''
        run: |
          npm install --global pnpm@10.33.0
          pnpm --version

      - name: Install dependencies
        run: task install

      - name: Run CI
        run: task ci

      - name: Publish test results
        if: always() && runner.os == 'Linux' && hashFiles('**/junit.xml', '**/test-results.xml') != ''
        uses: EnricoMi/publish-unit-test-result-action@c950f6fb443cb5af20a377fd0dfaa78838901040
        with:
          files: |
            **/junit.xml
            **/test-results.xml
