name: Mirror from oaslananka/fovux

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:
    inputs:
      force:
        description: "Force sync even if no changes"
        type: boolean
        default: false

concurrency:
  group: mirror
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  sync:
    if: github.repository == 'oaslananka-lab/fovux'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout org repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          token: ${{ secrets.MIRROR_PAT || secrets.DOPPLER_GITHUB_SERVICE_TOKEN || secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Sync personal mirror
        env:
          MIRROR_PAT: ${{ secrets.MIRROR_PAT }}
          FALLBACK_PAT: ${{ secrets.DOPPLER_GITHUB_SERVICE_TOKEN }}
          FORCE: ${{ inputs.force || 'false' }}
        run: |
          set -euo pipefail

          token="${MIRROR_PAT:-${FALLBACK_PAT:-}}"
          if [ -n "$token" ]; then
            personal_url="https://x-access-token:${token}@github.com/oaslananka/fovux.git"
          else
            personal_url="https://github.com/oaslananka/fovux.git"
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git remote add personal "$personal_url" || git remote set-url personal "$personal_url"
          git fetch personal main --prune

          if git diff HEAD personal/main --quiet && [ "$FORCE" != "true" ]; then
            echo "No changes to sync."
            exit 0
          fi

          git merge personal/main --ff-only
          git push origin main
