name: Release Please

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    if: github.repository == 'oaslananka-lab/fovux'
    runs-on: ubuntu-latest
    outputs:
      mcp_release_created: ${{ steps.rp.outputs['fovux-mcp--release_created'] }}
      mcp_tag_name: ${{ steps.rp.outputs['fovux-mcp--tag_name'] }}
      studio_release_created: ${{ steps.rp.outputs['fovux-studio--release_created'] }}
      studio_tag_name: ${{ steps.rp.outputs['fovux-studio--tag_name'] }}

    steps:
      - uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7
        id: rp
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
          token: ${{ secrets.GITHUB_TOKEN }}

  publish-mcp:
    needs: release-please
    if: >
      needs.release-please.outputs.mcp_release_created == 'true' &&
      github.repository == 'oaslananka-lab/fovux'
    runs-on: ubuntu-latest
    environment: pypi-production
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          ref: ${{ needs.release-please.outputs.mcp_tag_name }}
      - uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78
      - name: Build Python package
        working-directory: fovux-mcp
        run: uv build
      - uses: pypa/gh-action-pypi-publish@76f52bc884231f62b9a034ebfe128415bbaabdfc
        with:
          packages-dir: fovux-mcp/dist/

  publish-studio:
    needs: release-please
    if: >
      needs.release-please.outputs.studio_release_created == 'true' &&
      github.repository == 'oaslananka-lab/fovux'
    runs-on: ubuntu-latest
    environment: vsce-production
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          ref: ${{ needs.release-please.outputs.studio_tag_name }}
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version-file: .nvmrc
      - name: Build and publish extension
        working-directory: fovux-studio
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
          OVSX_PAT: ${{ secrets.OVSX_PAT }}
        run: |
          npm install --global pnpm@10.33.0
          pnpm install --frozen-lockfile
          npx --yes @vscode/vsce@3.9.1 package
          npx --yes @vscode/vsce@3.9.1 publish --pat "$VSCE_PAT"
          npx --yes ovsx@0.10.11 publish ./*.vsix --pat "$OVSX_PAT"
