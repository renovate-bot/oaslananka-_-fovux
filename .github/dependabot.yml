version: 2
updates:
  - package-ecosystem: uv
    directory: /fovux-mcp
    schedule:
      interval: daily
      time: "08:00"
      timezone: Europe/Istanbul
    open-pull-requests-limit: 10
    labels:
      - dependencies
      - uv
      - fovux-mcp
      - area:mcp
    commit-message:
      prefix: "chore(deps/mcp)"

  - package-ecosystem: pip
    directory: /fovux-mcp
    schedule:
      interval: weekly
      day: monday
      time: "08:00"
      timezone: Europe/Istanbul
    open-pull-requests-limit: 8
    labels:
      - dependencies
      - python
      - fovux-mcp
      - area:mcp
    commit-message:
      prefix: "chore(deps/mcp)"
    groups:
      python-minor-patch:
        patterns:
          - "*"
        update-types:
          - minor
          - patch
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: npm
    directory: /fovux-studio
    schedule:
      interval: weekly
      day: monday
      time: "08:00"
      timezone: Europe/Istanbul
    open-pull-requests-limit: 8
    labels:
      - dependencies
      - typescript
      - fovux-studio
      - area:studio
    commit-message:
      prefix: "chore(deps/studio)"
    groups:
      npm-minor-patch:
        patterns:
          - "*"
        update-types:
          - minor
          - patch
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: tuesday
      time: "08:00"
      timezone: Europe/Istanbul
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - ci
      - area:ci
    commit-message:
      prefix: "chore(ci)"
    groups:
      gha-all:
        patterns:
          - "*"