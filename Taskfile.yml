version: "3"

dotenv: [".env"]

vars:
  PYTHON: '{{.PYTHON | default "python"}}'

tasks:
  install:
    desc: Install all dev dependencies
    cmds:
      - cmd: cd fovux-mcp && uv sync --frozen --extra dev
        platforms: [linux, darwin, windows]
        ignore_error: false
      - cmd: pnpm --version
        platforms: [linux, darwin, windows]
      - cmd: cd fovux-studio && pnpm install --frozen-lockfile

  hooks:
    desc: Install git hooks
    cmds:
      - pre-commit install --install-hooks
      - pre-commit install --hook-type commit-msg
      - pre-commit install --hook-type pre-push

  format:
    desc: Auto-format the codebase
    cmds:
      - cmd: cd fovux-mcp && uvx ruff check --fix .
      - cmd: cd fovux-mcp && uvx ruff format .
      - cmd: cd fovux-studio && pnpm prettier --write .

  lint:
    desc: Run all linters (read-only)
    cmds:
      - cmd: cd fovux-mcp && uvx ruff check .
      - cmd: cd fovux-mcp && uvx ruff format --check .
      - cmd: cd fovux-studio && pnpm run lint
      - cmd: actionlint

  typecheck:
    desc: Static type checking
    cmds:
      - cmd: cd fovux-mcp && uv run mypy --strict --warn-unused-ignores src/fovux
      - cmd: cd fovux-studio && pnpm run typecheck

  test:
    desc: Run unit tests
    cmds:
      - cmd: cd fovux-mcp && uv run pytest -x --no-header -q
      - cmd: cd fovux-studio && pnpm test --run

  test:fast:
    desc: Run only fast tests
    cmds:
      - cmd: cd fovux-mcp && uv run pytest -x --no-header -q -m "not slow and not integration and not network and not gpu and not security and not chaos and not benchmark"

  test:cov:
    desc: Run tests with coverage
    cmds:
      - cmd: cd fovux-mcp && uv run pytest --cov=fovux --cov-fail-under=92 --cov-report=term-missing --cov-report=html --cov-report=xml
      - cmd: cd fovux-studio && pnpm test

  security:
    desc: Security scans
    cmds:
      - cmd: cd fovux-mcp && uv run bandit -r src/fovux -ll
      - cmd: cd fovux-mcp && uv export --no-dev --no-editable --no-emit-project --no-hashes --output-file requirements-audit.txt
      - cmd: cd fovux-mcp && uv run pip-audit --requirement requirements-audit.txt
      - cmd: cd fovux-studio && pnpm audit --prod
      - cmd: gitleaks detect --no-banner --redact

  build:
    desc: Build distributable packages
    cmds:
      - cmd: cd fovux-mcp && uv build
      - cmd: cd fovux-studio && pnpm run build

  pre-push:
    desc: What pre-push hook runs (typecheck + fast tests + workflow lint)
    cmds:
      - task: typecheck
      - task: test:fast
      - cmd: actionlint

  ci:
    desc: Run the exact CI pipeline locally - full parity
    cmds:
      - task: install
      - task: lint
      - task: typecheck
      - task: test:cov
      - task: security
      - task: build
      - task: release:dry-run

  release:dry-run:
    desc: Validate release automation without creating tags or releases
    cmds:
      - cmd: node scripts/validate_release_automation.mjs

  ci:act:
    desc: Run GitHub Actions workflows locally with nektos/act
    cmds:
      - act -W .github/workflows/ci.yml --container-architecture linux/amd64

  doppler:check:
    desc: Verify all required Doppler secrets are present
    cmds:
      - bash scripts/verify_doppler_secrets.sh

  clean:
    desc: Remove build artifacts and caches
    cmds:
      - cmd: rm -rf dist build .pytest_cache .mypy_cache .ruff_cache htmlcov coverage.xml junit.xml fovux-mcp/dist fovux-mcp/build fovux-mcp/htmlcov fovux-mcp/coverage.xml fovux-mcp/junit.xml fovux-mcp/requirements-audit.txt fovux-studio/out fovux-studio/*.vsix
        platforms: [linux, darwin]
      - cmd: powershell -NoProfile -ExecutionPolicy Bypass -File scripts/clean.ps1
        platforms: [windows]
